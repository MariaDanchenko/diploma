plugins {
    id 'java'
    id 'io.qameta.allure' version '2.12.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.36.0'
    implementation 'io.github.bonigarcia:webdrivermanager:6.1.0'
    implementation 'org.apache.logging.log4j:log4j-core:2.20.0'
    implementation 'org.apache.logging.log4j:log4j-api:2.20.0'
    testImplementation 'org.testng:testng:7.8.0'
    testImplementation 'io.qameta.allure:allure-testng:2.21.0'
    implementation 'io.qameta.allure:allure-attachments:2.27.0'
    testImplementation 'io.rest-assured:rest-assured:5.1.1'
}

test {
    useTestNG()
    systemProperty 'allure.results.directory', file("build/allure-results")
}